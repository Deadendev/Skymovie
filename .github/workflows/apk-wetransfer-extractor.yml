name: WeTransfer APK Source Extractor - Fully Fixed

on:
  workflow_dispatch:

jobs:
  extract-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # JAVA
      # ==========================================

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ==========================================
      # DEPENDENCIES
      # ==========================================

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            curl \
            unzip \
            zip \
            jq \
            file

      # ==========================================
      # APKTOOL
      # ==========================================

      - name: Install APKTool
        run: |
          wget \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar \
            -O apktool.jar

      # ==========================================
      # JADX
      # ==========================================

      - name: Install JADX
        run: |
          wget \
            https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip \
            -O jadx.zip

          unzip jadx.zip -d jadx

          chmod +x jadx/bin/jadx

      # ==========================================
      # DEX2JAR
      # ==========================================

      - name: Install dex2jar
        run: |
          wget \
            https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip \
            -O dex2jar.zip

          unzip dex2jar.zip

          mv dex-tools-v2.4 dex2jar

          chmod +x dex2jar/*.sh

      # ==========================================
      # DOWNLOAD APK
      # ==========================================

      - name: Download APK from WeTransfer
        run: |
          WT_URL="https://wetransfer.com/download/local-bartender?%3D%3D"

          echo "Starting download..."

          curl -L \
            --retry 5 \
            --retry-delay 5 \
            --max-time 600 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -o app.apk \
            "$WT_URL"

          echo ""
          echo "===== APK INFO ====="
          ls -lh app.apk
          file app.apk

      # ==========================================
      # VERIFY APK
      # ==========================================

      - name: Verify APK Validity
        run: |
          FILE_TYPE=$(file app.apk)

          echo "$FILE_TYPE"

          if [[ "$FILE_TYPE" != *"Zip archive"* ]] && \
             [[ "$FILE_TYPE" != *"Java archive"* ]] && \
             [[ "$FILE_TYPE" != *"Android package"* ]]; then

            echo "ERROR: Downloaded file is not a valid APK"
            exit 1
          fi

          echo "APK validation successful"

      # ==========================================
      # VERIFY APK CONTENTS
      # ==========================================

      - name: Verify APK Structure
        run: |
          unzip -l app.apk | head -50

      # ==========================================
      # APKTOOL DECOMPILE
      # ==========================================

      - name: Decode APK with APKTool
        run: |
          echo "Starting APKTool decode..."

          java -jar apktool.jar d app.apk -o decompiled -f

          echo "APKTool decode completed"

      # ==========================================
      # EXTRACT DEX FILES
      # ==========================================

      - name: Extract DEX Files
        run: |
          mkdir -p dex

          unzip -j app.apk "classes*.dex" -d dex || true

          echo "===== DEX FILES ====="
          ls -lh dex || true

      # ==========================================
      # DEX TO JAR
      # ==========================================

      - name: Convert DEX to JAR
        run: |
          mkdir -p jars

          for dex in dex/*.dex; do
            if [ -f "$dex" ]; then

              NAME=$(basename "$dex" .dex)

              echo "Converting: $dex"

              ./dex2jar/d2j-dex2jar.sh \
                -f "$dex" \
                -o "jars/$NAME.jar"

            fi
          done

          echo ""
          echo "===== GENERATED JARS ====="
          ls -lh jars || true

      # ==========================================
      # JADX JAVA SOURCE
      # ==========================================

      - name: Decompile Java Source with JADX
        run: |
          echo "Running JADX..."

          ./jadx/bin/jadx \
            --threads-count 4 \
            --deobf \
            --show-bad-code \
            -d java_source \
            app.apk

          echo "JADX completed"

      # ==========================================
      # VERIFY OUTPUTS
      # ==========================================

      - name: Verify Generated Source
        run: |
          echo "===== Decompiled ====="
          ls -lh decompiled || true

          echo ""
          echo "===== Java Source ====="
          ls -lh java_source || true

      # ==========================================
      # PACKAGE RESULTS
      # ==========================================

      - name: Package Extracted Source
        run: |
          zip -r extracted_source.zip \
            decompiled \
            java_source \
            jars \
            -9

          echo ""
          echo "===== FINAL ZIP ====="
          ls -lh extracted_source.zip

      # ==========================================
      # UPLOAD ARTIFACT
      # ==========================================

      - name: Upload Extracted Source
        uses: actions/upload-artifact@v4
        with:
          name: extracted-apk-source
          path: |
            extracted_source.zip
            decompiled/
            java_source/
            jars/
          retention-days: 3

      # ==========================================
      # CLEANUP
      # ==========================================

      - name: Cleanup
        if: always()
        run: |
          rm -f app.apk
          rm -f jadx.zip
          rm -f dex2jar.zip

          echo "Cleanup complete"
